<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard de Incidencias</title>
  <style>
    :root {
      font-family: "Inter", system-ui, sans-serif;
      background: #eef2ff;
      color: #0f172a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 2.4vw, 3rem);
      line-height: 1.05;
    }

    .subtitle {
      color: #475569;
      max-width: 52rem;
      line-height: 1.75;
      margin-top: 10px;
    }

    .button-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      background: #4338ca;
      color: white;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .button-link:hover {
      transform: translateY(-1px);
      background: #3730a3;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button-link.secondary {
      background: #e0e7ff;
      color: #312e81;
    }

    .button-link.secondary:hover {
      background: #c7d2fe;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      border: 1px solid #dbeafe;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    .stat-card h2 {
      margin: 0 0 10px;
      font-size: 1.9rem;
      color: #4338ca;
    }

    .stat-card p {
      margin: 0;
      color: #475569;
      line-height: 1.7;
    }

    .incident-list {
      display: grid;
      gap: 18px;
    }

    .incident-item {
      background: white;
      border: 1px solid #c7d2fe;
      border-radius: 20px;
      padding: 20px;
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    .incident-item:hover {
      transform: translateY(-2px);
      border-color: #4338ca;
    }

    .incident-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .incident-row strong {
      color: #1e293b;
    }

    .tag {
      padding: 6px 12px;
      border-radius: 999px;
      background: #e0e7ff;
      color: #3730a3;
      font-weight: 700;
      font-size: 0.92rem;
      display: inline-flex;
      align-items: center;
    }

    .incident-details p {
      margin: 6px 0;
      color: #475569;
      line-height: 1.7;
    }

    @media (max-width: 860px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1>Dashboard de Incidencias</h1>
        <p class="subtitle">Consulta el resumen de incidentes detectados, revisa los casos activos y revisa si hay intentos de escalada o fuga de datos.</p>
      </div>
      <div class="header-actions">
        <a class="button-link secondary" href="/viewbd">Ver BD</a>
        <a class="button-link" href="/">Volver al chat</a>
      </div>
    </header>

    <section class="stats-grid">
      <article class="stat-card">
        <h2 id="totalIncidents">0</h2>
        <p>Total de incidentes registrados</p>
      </article>
      <article class="stat-card">
        <h2 id="criticalCount">0</h2>
        <p>Incidentes críticos</p>
      </article>
      <article class="stat-card">
        <h2 id="openCount">0</h2>
        <p>Incidentes abiertos</p>
      </article>
    </section>

    <section>
      <h2>Incidentes recientes</h2>
      <div class="incident-list" id="incidents"></div>
    </section>
  </div>

    <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function loadSummary() {
      const response = await fetch("/api/dashboard/summary");
      const data = await response.json();
      document.getElementById("totalIncidents").textContent = data.total_incidents;
      document.getElementById("criticalCount").textContent = data.critical_count;
      document.getElementById("openCount").textContent = data.open_count;
    }

    async function loadIncidents() {
      const response = await fetch("/api/incidents");
      const data = await response.json();
      const container = document.getElementById("incidents");

      if (!data.length) {
        container.innerHTML = "<p>No hay incidentes registrados todavía.</p>";
        return;
      }

      container.innerHTML = data.map(item => {
        const incidentCode = escapeHtml(item.incident_code);
        const severity = escapeHtml(item.severity);
        const category = escapeHtml(item.category);
        const status = escapeHtml(item.status);
        const confidence = escapeHtml(item.confidence);
        const inputText = escapeHtml(item.input_text);
        const outputText = escapeHtml(item.output_text ?? "-");

        return `
          <article class="incident-item">
            <div class="incident-row">
              <strong>${incidentCode}</strong>
              <span class="tag">${severity}</span>
            </div>
            <div class="incident-details">
              <p><strong>Categoría:</strong> ${category}</p>
              <p><strong>Estado:</strong> ${status}</p>
              <p><strong>Confianza:</strong> ${confidence}</p>
              <p><strong>Input:</strong> ${inputText}</p>
              <p><strong>Output:</strong> ${outputText}</p>
            </div>
          </article>
        `;
      }).join("");
    }

    loadSummary();
    loadIncidents();
  </script>
</body>
</html>
