<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard · Monitor de Incidencias</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="/static/styles.css">
<script src="/static/demo-fallback.js"></script>
</head>
<body>
<div class="aurora"></div>
<div class="grain"></div>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark"></div>
    <div>Monitor de Incidencias<div><small>v2 · detección en vivo</small></div></div>
  </div>
  <nav class="nav">
    <a href="/">Chat</a>
    <a href="/prompt-check">Check input</a>
    <a href="/dashboard" class="active">Dashboard</a>
    <a href="/viewbd">Base de datos</a>
  </nav>
  <div class="live-indicator">
    <span class="dot green" style="width:8px;height:8px"></span>
    sync
  </div>
</header>

<main class="page">
  <div class="section-h">
    <h2>Dashboard</h2>
    <span class="tag">/ incidentes registrados</span>
  </div>

  <section class="stats">
    <div class="stat cyan fade-up">
      <div class="glow"></div>
      <div class="label"><span class="dot neutral" style="width:6px;height:6px;background:var(--cyan);box-shadow:0 0 8px var(--cyan);"></span>Total</div>
      <div class="num"><span id="totalIncidents" data-num="0">0</span></div>
      <svg class="spark" viewBox="0 0 200 36" preserveAspectRatio="none"><path stroke="var(--cyan)" d=""/></svg>
    </div>
    <div class="stat red fade-up" style="animation-delay: 80ms">
      <div class="glow"></div>
      <div class="label"><span class="dot neutral" style="width:6px;height:6px;background:var(--red);box-shadow:0 0 8px var(--red);"></span>Críticos</div>
      <div class="num"><span id="criticalCount" data-num="0">0</span></div>
      <svg class="spark" viewBox="0 0 200 36" preserveAspectRatio="none"><path stroke="var(--red)" d=""/></svg>
    </div>
    <div class="stat amber fade-up" style="animation-delay: 160ms">
      <div class="glow"></div>
      <div class="label"><span class="dot neutral" style="width:6px;height:6px;background:var(--amber);box-shadow:0 0 8px var(--amber);"></span>Abiertos</div>
      <div class="num"><span id="openCount" data-num="0">0</span></div>
      <svg class="spark" viewBox="0 0 200 36" preserveAspectRatio="none"><path stroke="var(--amber)" d=""/></svg>
    </div>
  </section>

  <div class="sec-head">
    <h2>Incidentes recientes</h2>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">Todos</button>
      <button class="filter-btn" data-filter="CRITICAL">Críticos</button>
      <button class="filter-btn" data-filter="HIGH">Altos</button>
      <button class="filter-btn" data-filter="MEDIUM">Medios</button>
      <button class="filter-btn" data-filter="LOW">Bajos</button>
    </div>
  </div>

  <div id="incidents" class="incidents"></div>
</main>

<script>
function escapeHtml(v) {
  return String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}

// Animated count-up
function countUp(el, to, dur = 900) {
  const start = Number(el.dataset.num) || 0;
  const delta = to - start;
  const t0 = performance.now();
  function tick(now) {
    const p = Math.min(1, (now - t0) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(start + delta * eased).toString();
    if (p < 1) requestAnimationFrame(tick);
    else el.dataset.num = to;
  }
  requestAnimationFrame(tick);
}

// Sparkline generator (fake-ish but seeded by value)
function renderSpark(svg, value) {
  const path = svg.querySelector("path");
  const pts = [];
  const n = 24;
  const seed = Math.max(1, value);
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1);
    const noise = Math.sin(i * 1.7 + seed) * 0.3 + Math.cos(i * 0.9 + seed * 0.3) * 0.25;
    const y = 18 + noise * 12 - t * 4;
    pts.push([t * 200, y]);
  }
  // smooth curve
  let d = `M ${pts[0][0]},${pts[0][1]}`;
  for (let i = 1; i < pts.length; i++) {
    const [x1, y1] = pts[i - 1];
    const [x2, y2] = pts[i];
    const cx = (x1 + x2) / 2;
    d += ` Q ${cx},${y1} ${x2},${y2}`;
  }
  path.setAttribute("d", d);
  // draw-on animation
  const len = path.getTotalLength?.() || 300;
  path.style.strokeDasharray = len;
  path.style.strokeDashoffset = len;
  requestAnimationFrame(() => {
    path.style.transition = "stroke-dashoffset 1.2s ease-out";
    path.style.strokeDashoffset = 0;
  });
}

async function loadSummary() {
  try {
    const r = await fetch("/api/dashboard/summary");
    const d = await r.json();
    const total = d.total_incidents ?? 0;
    const crit  = d.critical_count ?? 0;
    const open  = d.open_count ?? 0;
    countUp(document.getElementById("totalIncidents"), total);
    countUp(document.getElementById("criticalCount"), crit);
    countUp(document.getElementById("openCount"), open);
    document.querySelectorAll(".spark").forEach((svg, i) => {
      const val = [total, crit, open][i] || 1;
      renderSpark(svg, val);
    });
  } catch {}
}

let allIncidents = [];
let activeFilter = "all";

function sevClass(sev) {
  const s = String(sev || "").toUpperCase();
  if (s === "CRITICAL") return "sev-critical";
  if (s === "HIGH") return "sev-high";
  if (s === "MEDIUM") return "sev-medium";
  return "sev-low";
}
function sevPill(sev) {
  const s = String(sev || "").toUpperCase();
  if (s === "CRITICAL" || s === "HIGH") return "danger";
  if (s === "MEDIUM") return "warn";
  return "ok";
}

function renderList() {
  const container = document.getElementById("incidents");
  const rows = allIncidents.filter(i => activeFilter === "all" || String(i.severity || "").toUpperCase() === activeFilter);
  if (!rows.length) {
    container.innerHTML = `<div class="empty"><div class="big">∅</div>Sin incidentes para este filtro.</div>`;
    return;
  }
  container.innerHTML = rows.map((item, i) => {
    const sev = escapeHtml(item.severity);
    return `
      <article class="incident ${sevClass(item.severity)} fade-up" style="animation-delay:${i * 40}ms" data-idx="${i}">
        <div class="inc-code">${escapeHtml(item.incident_code)}</div>
        <div class="inc-body">
          <div class="cat">${escapeHtml(item.category)} · ${escapeHtml(item.status)}</div>
          <div class="text">${escapeHtml(item.input_text || "—")}</div>
        </div>
        <div class="inc-meta">
          <span class="pill ${sevPill(item.severity)}">${sev}</span>
          <span class="mono" style="font-size:0.72rem; color:var(--ink-mute);">conf ${escapeHtml(item.confidence ?? "—")}</span>
        </div>
        <div class="inc-expand">
          <dl class="kv">
            <dt>input</dt><dd>${escapeHtml(item.input_text ?? "—")}</dd>
            <dt>output</dt><dd>${escapeHtml(item.output_text ?? "—")}</dd>
            <dt>estado</dt><dd>${escapeHtml(item.status)}</dd>
            <dt>confianza</dt><dd>${escapeHtml(item.confidence ?? "—")}</dd>
          </dl>
        </div>
      </article>
    `;
  }).join("");

  container.querySelectorAll(".incident").forEach((el) => {
    el.addEventListener("click", () => el.classList.toggle("open"));
  });
}

async function loadIncidents() {
  try {
    const r = await fetch("/api/incidents");
    allIncidents = await r.json();
    renderList();
  } catch {
    document.getElementById("incidents").innerHTML = `<div class="empty">No se pudieron cargar los incidentes.</div>`;
  }
}

document.getElementById("filters").addEventListener("click", (e) => {
  const b = e.target.closest(".filter-btn"); if (!b) return;
  document.querySelectorAll(".filter-btn").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  activeFilter = b.dataset.filter;
  renderList();
});

loadSummary();
loadIncidents();
</script>
</body>
</html>
