<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Base de datos · Monitor de Incidencias</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="/static/styles.css">
<script src="/static/demo-fallback.js"></script>
</head>
<body>
<div class="aurora"></div>
<div class="grain"></div>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark"></div>
    <div>Monitor de Incidencias<div><small>v2 · detección en vivo</small></div></div>
  </div>
  <nav class="nav">
    <a href="/">Chat</a>
    <a href="/prompt-check">Check input</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/viewbd" class="active">Base de datos</a>
  </nav>
  <div class="live-indicator">
    <span class="dot green" style="width:8px;height:8px"></span>
    sqlite
  </div>
</header>

<main class="page">
  <div class="section-h">
    <h2>Base de datos</h2>
    <span class="tag">/ sqlite · inspector</span>
  </div>

  <div class="layout">
    <aside class="sidebar" id="tableButtons"></aside>

    <section class="main">
      <div class="toolbar">
        <div class="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
          <input type="text" id="searchInput" placeholder="Filtrar filas…">
        </div>
        <select id="limitSelect">
          <option value="25">25 filas</option>
          <option value="50">50 filas</option>
          <option value="100" selected>100 filas</option>
          <option value="200">200 filas</option>
          <option value="500">500 filas</option>
        </select>
        <button class="btn" id="reloadBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12a9 9 0 0 1 15.5-6.3M21 12a9 9 0 0 1-15.5 6.3"/><path d="M21 3v6h-6M3 21v-6h6"/></svg>
          Recargar
        </button>
      </div>

      <div class="meta-bar" id="tableMeta">Selecciona una tabla…</div>
      <div id="tableContainer">
        <div class="empty">Ninguna tabla cargada.</div>
      </div>
    </section>
  </div>
</main>

<script>
const API_BASE = "/api/viewbd";
const tableButtons = document.getElementById("tableButtons");
const tableContainer = document.getElementById("tableContainer");
const tableMeta = document.getElementById("tableMeta");
const limitSelect = document.getElementById("limitSelect");
const reloadBtn = document.getElementById("reloadBtn");
const searchInput = document.getElementById("searchInput");

const state = { tables: [], activeTable: null, columns: [], rows: [] };

function escapeHtml(v) {
  return String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}

function tableIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16"/></svg>`;
}

function renderButtons() {
  if (!state.tables.length) {
    tableButtons.innerHTML = `<div class="empty">Sin tablas.</div>`;
    return;
  }
  tableButtons.innerHTML = state.tables.map((t, i) => `
    <button class="tbtn ${state.activeTable === t.name ? 'active' : ''} fade-up" style="animation-delay:${i * 50}ms" data-table="${escapeHtml(t.name)}">
      <span class="name"><span class="icon">${tableIcon()}</span>${escapeHtml(t.name)}</span>
      <span class="count">${escapeHtml(t.row_count)}</span>
    </button>
  `).join("");
}

function renderRows(filter = "") {
  const cols = state.columns;
  const rows = filter
    ? state.rows.filter(r => cols.some(c => String(r[c] ?? "").toLowerCase().includes(filter.toLowerCase())))
    : state.rows;

  if (!cols.length) { tableContainer.innerHTML = `<div class="empty">Sin columnas.</div>`; return; }
  if (!rows.length) { tableContainer.innerHTML = `<div class="empty">Sin filas${filter ? " para este filtro" : ""}.</div>`; return; }

  const thead = cols.map(c => `<th>${escapeHtml(c)}</th>`).join("");
  const tbody = rows.map((r, i) => {
    const tds = cols.map(c => {
      const v = r[c];
      if (v === null || v === undefined || v === "") return `<td class="null">—</td>`;
      const isNum = typeof v === "number" || (/^-?\d+(\.\d+)?$/.test(String(v)));
      return `<td class="${isNum ? 'num' : ''}">${escapeHtml(v)}</td>`;
    }).join("");
    return `<tr style="animation-delay:${Math.min(i * 15, 500)}ms">${tds}</tr>`;
  }).join("");

  tableContainer.innerHTML = `
    <div class="table-shell">
      <table>
        <thead><tr>${thead}</tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>
  `;
}

async function loadTable(name) {
  state.activeTable = name;
  renderButtons();
  tableMeta.textContent = `Cargando ${name}…`;
  tableContainer.innerHTML = `<div class="table-shell" style="padding:16px">
    ${Array.from({length: 6}).map(() => `<div class="skeleton-row"></div>`).join("")}
  </div>`;

  const limit = Number(limitSelect.value) || 100;
  try {
    const r = await fetch(`${API_BASE}/tables/${encodeURIComponent(name)}?limit=${limit}`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail || "No se pudo cargar.");
    }
    const data = await r.json();
    state.columns = data.columns || [];
    state.rows = data.rows || [];
    tableMeta.innerHTML = `<span style="color: var(--ink)">${escapeHtml(data.table_name)}</span> · <span>${escapeHtml(data.returned_rows)} / ${escapeHtml(data.total_rows)} filas</span>`;
    renderRows(searchInput.value);
  } catch (e) {
    tableContainer.innerHTML = `<div class="err">${escapeHtml(e.message || "Error")}</div>`;
  }
}

async function loadTables() {
  try {
    const r = await fetch(`${API_BASE}/tables`);
    if (!r.ok) throw new Error();
    const d = await r.json();
    state.tables = d.tables || [];
    renderButtons();
    if (state.tables.length) loadTable(state.tables[0].name);
    else {
      tableMeta.textContent = "Sin tablas disponibles.";
      tableContainer.innerHTML = `<div class="empty">La base de datos está vacía.</div>`;
    }
  } catch {
    tableContainer.innerHTML = `<div class="err">No se pudieron cargar las tablas.</div>`;
  }
}

tableButtons.addEventListener("click", (e) => {
  const b = e.target.closest("[data-table]"); if (!b) return;
  loadTable(b.dataset.table);
});
reloadBtn.addEventListener("click", () => { if (state.activeTable) loadTable(state.activeTable); });
limitSelect.addEventListener("change", () => { if (state.activeTable) loadTable(state.activeTable); });
searchInput.addEventListener("input", () => renderRows(searchInput.value));

loadTables();
</script>
</body>
</html>
